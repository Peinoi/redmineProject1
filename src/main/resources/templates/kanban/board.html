<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>칸반 보드</title>

    <link rel="stylesheet" th:href="@{/css/issue/issue-board.css}" />

    <!-- SortableJS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <script defer th:src="@{/js/issue/kanban-board.js}"></script>
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">칸반 보드</h3>
      <div class="page-title-sub">프로젝트별 일감을 칸반으로 관리할 수 있습니다.</div>
    </div>

    <div class="card mb-3">
      <div class="card-body d-flex align-items-center justify-content-between gap-2 flex-wrap">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <div class="fw-bold">프로젝트</div>

          <!-- 프로젝트 이름 표시 -->
          <div class="text-muted" th:text="${projectName}">프로젝트명</div>

          <!-- projectCode는 JS가 읽도록 data로 박아둠 -->
          <div
            id="kanbanBoard"
            class="d-none"
            th:attr="data-project-code=${projectCode}, data-can-write=${canWrite}"
          ></div>
        </div>

        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-sm" th:href="@{/issueList}">
            목록으로
          </a>
          <a class="btn btn-primary btn-sm" th:href="@{/issueInsert}">
            일감 등록
          </a>
        </div>
      </div>
    </div>

    <!-- Kanban Layout -->
    <div class="kanban-wrap" id="kanbanWrap">
      <!-- 컬럼 템플릿: OB1 -->
      <section class="kan-col">
        <header class="kan-col-header">
          <div class="kan-col-title">신규</div>
          <div class="kan-col-count" data-count-for="OB1">0</div>
        </header>

        <div class="kan-col-body" data-status="OB1">
          <!-- 서버 렌더링: OB1 리스트 -->
          <div
            class="kan-card"
            th:each="it : ${ob1List}"
            th:attr="data-issue-code=${it.issueCode}"
          >
            <div class="kan-card-title" th:text="${it.title}">제목</div>

            <div class="kan-card-meta">
              <span class="badge text-bg-light" th:text="${it.priority}">우선순위</span>
              <span class="text-muted" th:text="${it.assigneeName}">담당자</span>
            </div>

            <div class="kan-card-sub text-muted">
              <span th:text="${it.creatorName}">등록자</span>
              <span> · </span>
              <span th:text="${#temporals.format(it.createdAt,'yyyy-MM-dd')}">2026-02-10</span>
            </div>
          </div>
        </div>
      </section>

      <!-- OB2 -->
      <section class="kan-col">
        <header class="kan-col-header">
          <div class="kan-col-title">진행</div>
          <div class="kan-col-count" data-count-for="OB2">0</div>
        </header>

        <div class="kan-col-body" data-status="OB2">
          <div
            class="kan-card"
            th:each="it : ${ob2List}"
            th:attr="data-issue-code=${it.issueCode}"
          >
            <div class="kan-card-title" th:text="${it.title}">제목</div>
            <div class="kan-card-meta">
              <span class="badge text-bg-light" th:text="${it.priority}">우선순위</span>
              <span class="text-muted" th:text="${it.assigneeName}">담당자</span>
            </div>
            <div class="kan-card-sub text-muted">
              <span th:text="${it.creatorName}">등록자</span>
              <span> · </span>
              <span th:text="${#temporals.format(it.createdAt,'yyyy-MM-dd')}">2026-02-10</span>
            </div>
          </div>
        </div>
      </section>

      <!-- OB3 -->
      <section class="kan-col">
        <header class="kan-col-header">
          <div class="kan-col-title">해결</div>
          <div class="kan-col-count" data-count-for="OB3">0</div>
        </header>

        <div class="kan-col-body" data-status="OB3">
          <div
            class="kan-card"
            th:each="it : ${ob3List}"
            th:attr="data-issue-code=${it.issueCode}"
          >
            <div class="kan-card-title" th:text="${it.title}">제목</div>
            <div class="kan-card-meta">
              <span class="badge text-bg-light" th:text="${it.priority}">우선순위</span>
              <span class="text-muted" th:text="${it.assigneeName}">담당자</span>
            </div>
            <div class="kan-card-sub text-muted">
              <span th:text="${it.creatorName}">등록자</span>
              <span> · </span>
              <span th:text="${#temporals.format(it.createdAt,'yyyy-MM-dd')}">2026-02-10</span>
            </div>
          </div>
        </div>
      </section>

      <!-- OB4 -->
      <section class="kan-col">
        <header class="kan-col-header">
          <div class="kan-col-title">반려</div>
          <div class="kan-col-count" data-count-for="OB4">0</div>
        </header>

        <div class="kan-col-body" data-status="OB4">
          <div
            class="kan-card"
            th:each="it : ${ob4List}"
            th:attr="data-issue-code=${it.issueCode}"
          >
            <div class="kan-card-title" th:text="${it.title}">제목</div>
            <div class="kan-card-meta">
              <span class="badge text-bg-light" th:text="${it.priority}">우선순위</span>
              <span class="text-muted" th:text="${it.assigneeName}">담당자</span>
            </div>
            <div class="kan-card-sub text-muted">
              <span th:text="${it.creatorName}">등록자</span>
              <span> · </span>
              <span th:text="${#temporals.format(it.createdAt,'yyyy-MM-dd')}">2026-02-10</span>
            </div>
          </div>
        </div>
      </section>

      <!-- OB5 -->
      <section class="kan-col">
        <header class="kan-col-header">
          <div class="kan-col-title">완료</div>
          <div class="kan-col-count" data-count-for="OB5">0</div>
        </header>

        <div class="kan-col-body" data-status="OB5">
          <div
            class="kan-card"
            th:each="it : ${ob5List}"
            th:attr="data-issue-code=${it.issueCode}"
          >
            <div class="kan-card-title" th:text="${it.title}">제목</div>
            <div class="kan-card-meta">
              <span class="badge text-bg-light" th:text="${it.priority}">우선순위</span>
              <span class="text-muted" th:text="${it.assigneeName}">담당자</span>
            </div>
            <div class="kan-card-sub text-muted">
              <span th:text="${it.creatorName}">등록자</span>
              <span> · </span>
              <span th:text="${#temporals.format(it.createdAt,'yyyy-MM-dd')}">2026-02-10</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- 토스트(공통) -->
    <div
      id="commonToast"
      class="toast align-items-center text-bg-dark border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      style="position: fixed; right: 16px; bottom: 16px; z-index: 1080; display: none;"
    >
      <div class="d-flex">
        <div class="toast-body" id="commonToastBody"></div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"
          aria-label="Close"
        ></button>
      </div>
    </div>
  </body>
</html>

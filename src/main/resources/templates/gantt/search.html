<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<div th:fragment="searchCondition">
	<!-- 검색조건 내용 -->
	<!-- 검색조건 토글 버튼 -->
	<button type="button" class="btn btn-outline-secondary mb-2"
		id="btnToggleSearch">검색조건 열기</button>

	<!-- 검색조건 전체 wrapper (기본 닫힘) -->
	<div id="searchConditionWrapper" style="display: none;">

		<div class="search-filters mb-3 mt-3">
			<div class="row g-2 align-items-end">
				<div class="col-12 col-md-3">
					<label class="form-label">프로젝트</label>
					<div class="input-group">
						<input type="text" id="filterProjectText" class="form-control"
							placeholder="프로젝트 선택" readonly> <input type="hidden"
							id="filterProjectValue">
						<button type="button" class="btn btn-secondary"
							id="btnOpenProjectModal">선택</button>
					</div>
				</div>

				<div class="col-12 col-md-3">
					<label class="form-label">일감명</label> <input type="text"
						id="filterTitle" class="form-control" placeholder="일감명 입력">
				</div>

				<div class="col-12 col-md-3">
					<label class="form-label">상태</label> <select id="filterStatus"
						class="form-select">
						<option value="">전체</option>
						<option value="OB1">신규</option>
						<option value="OB2">진행</option>
						<option value="OB3">해결</option>
						<option value="OB4">반려</option>
						<option value="OB5">완료</option>
					</select>
				</div>

				<div class="col-12 col-md-3">
					<label class="form-label">우선순위</label> <select id="filterPriority"
						class="form-select">
						<option value="">전체</option>
						<option value="OA1">긴급</option>
						<option value="OA2">높음</option>
						<option value="OA3">보통</option>
						<option value="OA4">낮음</option>
					</select>
				</div>
			</div>

			<div class="row g-2 align-items-end mt-1">
				<div class="col-12 col-md-3">
					<label class="form-label">담당자</label>
					<div class="input-group">
						<input type="text" id="filterAssigneeText" class="form-control"
							placeholder="담당자 선택" readonly> <input type="hidden"
							id="filterAssigneeValue">
						<button type="button" class="btn btn-secondary"
							id="btnOpenAssigneeModal">선택</button>
					</div>
				</div>

				<div class="col-12 col-md-6">
					<div class="row g-2">
						<div class="col">
							<label class="form-label">일감 시작일</label> <input type="date"
								id="filterStartDateFrom" class="form-control">
						</div>
						<div class="col-auto d-flex align-items-end pb-2">
							<span class="text-muted">~</span>
						</div>
						<div class="col">
							<label class="form-label">일감 시작일</label> <input type="date"
								id="filterStartDateTo" class="form-control">
						</div>
					</div>
				</div>

				<div class="col-12 col-md-3">
					<label class="form-label">일감 종료일</label> <input type="date"
						id="filterEndDate" class="form-control">
				</div>
			</div>
			<div class="d-flex justify-content-between align-items-center mt-3">
				<div class="d-flex gap-2">
					<button type="button" class="btn btn-secondary"
						id="btnResetFilters">초기화</button>
					<button type="button" class="btn btn-primary" id="btnApplyFilters">조회</button>
				</div>
			</div>
		</div>

		<div class="modal fade" id="projectSelectModal" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-lg modal-dialog-scrollable">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">프로젝트 선택</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<input type="text" id="projectModalSearch"
							class="form-control mb-2" placeholder="프로젝트명 검색">
						<div class="list-group" id="projectModalList"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="assigneeSelectModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">담당자 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<input type="text" id="assigneeModalSearch"
						class="form-control mb-2" placeholder="담당자명 검색">
					<div class="list-group" id="assigneeModalList"></div>
				</div>
			</div>
		</div>
	</div>
</div>

</html>

<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>일감 상세</title>
    <link rel="stylesheet" th:href="@{/css/issue/issue-info.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">일감 상세</h3>
      <div class="page-title-sub">일감의 상세 정보를 확인할 수 있습니다.</div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-2">
      <button type="button" class="btn btn-secondary" id="btnBack">
        <i class="fas fa-arrow-left me-1"></i>돌아가기
      </button>

      <div class="d-flex gap-2">
        <button
          type="button"
          class="btn btn-success"
          id="btnEdit"
          th:attr="data-can-modify=${canModify}"
        >
          <i class="fas fa-edit me-1"></i>일감 수정
        </button>
        <button
          type="button"
          class="btn btn-danger"
          id="btnDelete"
          th:attr="data-can-delete=${canDelete}"
        >
          <i class="fa-solid fa-minus me-1"></i>삭제
        </button>
      </div>
    </div>

    <section class="issue-summary">
      <div class="issue-summary-head">
        <div class="issue-summary-title">
          <span class="project" th:text="${issue.projectName}">프로젝트명</span>
          <span class="sep">:</span>
          <span class="issue">
            <span th:text="${issue.title}">일감명</span>

            <span
              class="badge due-badge"
              th:if="${issue.dueAt != null and issue.dueAt.toLocalDate().isBefore(T(java.time.LocalDate).now())}"
            >
              마감
            </span>
          </span>

          <th:block th:if="${issue.parIssueTitle != null}">
            <span class="sep">상위일감 :</span>
            <span class="issue" th:text="${issue.parIssueTitle}"></span>
          </th:block>
        </div>
      </div>

      <table class="issue-meta">
        <tbody>
          <tr>
            <th>유형</th>
            <td th:text="${issue.typeName != null ? issue.typeName : '-'}">
              -
            </td>

            <th>상태</th>
            <td th:text="${issue.statusName}"></td>
          </tr>

          <tr>
            <th>우선순위</th>
            <td th:text="${issue.priorityName}"></td>

            <th>담당자</th>
            <td th:text="${issue.assigneeName}"></td>
          </tr>

          <tr>
            <th>등록자</th>
            <td th:text="${issue.creatorName}"></td>

            <th>진척도</th>
            <td><span th:text="${issue.progress}"></span><span>%</span></td>
          </tr>

          <tr>
            <th>등록일</th>
            <td th:text="${#temporals.format(issue.createdAt, 'yyyy-MM-dd')}">
              2026-02-05
            </td>

            <th>마감기한</th>
            <td
              th:classappend="${issue.dueAt != null and issue.dueAt.toLocalDate().isBefore(T(java.time.LocalDate).now())} ? 'due-over' : ''"
              th:text="${issue.dueAt != null ? #temporals.format(issue.dueAt, 'yyyy-MM-dd') : '-'}"
            >
              -
            </td>
          </tr>

          <tr>
            <th>시작일</th>
            <td
              th:text="${issue.startedAt != null ? #temporals.format(issue.startedAt, 'yyyy-MM-dd') : '-'}"
            >
              -
            </td>

            <th>완료일</th>
            <td
              th:text="${issue.resolvedAt != null ? #temporals.format(issue.resolvedAt, 'yyyy-MM-dd') : '-'}"
            >
              -
            </td>
          </tr>

          <tr>
            <th>첨부파일</th>
            <td>
              <span th:if="${issue.fileCode == null}">-</span>
              <a
                th:if="${issue.fileCode != null}"
                th:href="${issue.filePath}"
                th:text="${issue.originalName}"
                target="_blank"
                rel="noopener"
                >다운로드</a
              >
            </td>

            <th>파일 등록일</th>
            <td
              th:text="${issue.uploadedAt != null ? #temporals.format(issue.uploadedAt, 'yyyy-MM-dd') : '-'}"
            >
              -
            </td>
          </tr>
        </tbody>
      </table>
    </section>

    <!-- 설명 -->
    <section class="issue-desc">
      <h4 class="section-title">설명</h4>
      <pre class="desc-box" th:utext="${issue.description}">설명 내용</pre>
    </section>

    <!-- 승인/반려 -->
    <div
      class="d-flex justify-content-center align-items-center mt-2"
      th:if="${isAdmin and (issue.statusId == 'OB3')}"
    >
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-success" id="btnApprove">
          <i class="fas fa-check me-1"></i>승인
        </button>
        <button type="button" class="btn btn-danger" id="btnReject">
          <i class="fas fa-times me-1"></i>반려
        </button>
        <button
          type="button"
          class="btn btn-outline-secondary"
          id="btnRejectHistory"
        >
          <i class="fa-regular fa-clock me-1"></i>반려이력
        </button>
      </div>
    </div>

    <!-- 반려 사유 입력 모달 -->
    <div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">반려 사유</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <textarea
              class="form-control"
              id="rejectReason"
              rows="5"
              placeholder="반려 사유를 입력하세요."
            ></textarea>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              취소
            </button>
            <button type="button" class="btn btn-danger" id="btnRejectSubmit">
              반려
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 반려 이력 모달 -->
    <div
      class="modal fade"
      id="rejectHistoryModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">반려 이력</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <div class="table-responsive">
              <table class="table table-sm align-middle text-center">
                <thead>
                  <tr>
                    <th style="width: 50%">반려일시</th>
                    <th style="width: 50%">반려자</th>
                  </tr>
                </thead>
                <tbody id="rejectHistoryTbody">
                  <tr>
                    <td colspan="3" class="text-muted">이력이 없습니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <hr />

            <div>
              <div class="fw-bold mb-2">반려 사유</div>
              <pre
                id="rejectHistoryReason"
                class="mb-0"
                style="white-space: pre-wrap"
              >
행을 선택하면 사유가 표시됩니다.</pre
              >
            </div>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              닫기
            </button>
          </div>
        </div>
      </div>
    </div>

    <section class="issue-history">
      <h4 class="section-title">이력</h4>

      <div class="history-box">
        <div class="empty" th:if="${logs == null or #lists.isEmpty(logs)}">
          이력이 없습니다.
        </div>

        <div
          class="history-list"
          th:if="${logs != null and !#lists.isEmpty(logs)}"
        >
          <div
            class="history-item"
            th:each="log : ${logs}"
            th:attr="data-meta=${log.meta},
                    data-action=${log.actionType},
                    data-user=${log.userName != null ? log.userName : log.userCode},
                    data-time=${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"
          >
            <div class="history-head">
              <span
                class="head-line"
                th:text="|${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')} / ${log.actionType == 'CREATE' ? '생성' : (log.actionType == 'UPDATE' ? '수정' : log.actionType)} / ${log.userName != null ? log.userName : log.userCode}|"
              ></span>
            </div>

            <div class="history-body">
              <div class="change-lines"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script th:src="@{/js/issue/issue-info.js}"></script>
  </body>
</html>

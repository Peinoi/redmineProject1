<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">

<head>
<meta charset="UTF-8">
<title>프로젝트 개요</title>
<link rel="stylesheet" th:href="@{/css/overview/overview.css}">
</head>
<body>
	<div id="container">
		<!-- 페이지 제목 -->
		<div class="x-page-title">
			<h3 class="page-title">프로젝트 개요</h3>
			<div class="page-title-sub">프로젝트 개요입니다.</div>
		</div>

		<h2 th:text="${project.projectName}">프로젝트명</h2>
		<p th:text="${project.description}">프로젝트 설명</p>

		<!-- 메인 그리드: 상단 2컬럼 + 하단 전체 가로 -->
		<div class="main-grid">

			<!-- 1) 일감현황 -->
			<div class="main-card">
				<div class="card-header">
					<div>
						<i class="fas fa-table me-1"></i>일감현황
					</div>
					<div class="text-muted small">신규/진행/해결/반려/완료</div>
				</div>
				<div class="card-body p-0">
					<div class="main-table-wrap">
						<table class="table table-hover align-middle text-center mb-0"
							id="mainIssueTable">
							<thead>
								<tr>
									<th style="width: 90px;">신규</th>
									<th style="width: 90px;">진행</th>
									<th style="width: 90px;">해결</th>
									<th style="width: 90px;">반려</th>
									<th style="width: 90px;">완료</th>
									<th style="width: 100px;">합계</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="list : ${issueStatusList}"
									th:with="
								         n=${list.newIss ?: 0},
								         p=${list.progress ?: 0},
								         s=${list.solution ?: 0},
								         r=${list.returnIss ?: 0},
								         c=${list.completion ?: 0},
								         total=${n + p + s + r + c}
								    "
									th:classappend="click-row"
									th:attr="data-url=@{|/G2main/${list.projectCode}/issuesStatus|}">

									<td th:text="${n}">0</td>
									<td th:text="${p}">0</td>
									<td th:text="${s}">0</td>
									<td th:text="${r}">0</td>
									<td th:text="${c}">0</td>
									<td class="fw-bold" th:text="${total}">0</td>
								</tr>

								<tr th:if="${#lists.isEmpty(issueStatusList)}"
									class="no-data-row">
									<td colspan="7" class="text-center text-muted py-3">표시할
										데이터가 없습니다.</td>
								</tr>
							</tbody>

						</table>
					</div>
				</div>
			</div>

			<!-- 2) 공지사항 -->
			<div class="main-card">
				<div class="card-header">
					<div>
						<i class="fas fa-bullhorn me-1"></i>공지사항
					</div>
					<a class="text-decoration-none small" href="/notice">더보기</a>
				</div>
				<div class="card-body p-0">
					<div class="notice-list list-group list-group-flush">
						<a th:each="n : ${noticeList}"
							th:href="@{/notice/{id}(id=${n.noticeId})}"
							class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
							<div class="me-2">
								<div class="notice-title" th:text="${n.title}">공지 제목</div>
								<div class="notice-meta">
									<span th:text="${n.writerName}">관리자</span> <span class="mx-1">·</span>
									<span th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd')}">2026-02-11</span>
								</div>
							</div> <span class="badge notice-badge" th:if="${n.isNew == 'Y'}">NEW</span>
						</a>

						<div class="p-3 text-muted"
							th:if="${noticeList == null or #lists.isEmpty(noticeList)}">
							등록된 공지사항이 없습니다.</div>
					</div>
				</div>
			</div>

			<!-- 3) 구성원 (하단 전체 가로) -->
			<div class="main-card full-width">
				<div class="card-header">
					<div>
						<i class="fas fa-users me-1"></i>구성원/그룹
					</div>
					<div class="text-muted small">
						<span
							th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">오늘</span>
					</div>
				</div>
				<div class="card-body p-0">
					<ul class="member-list list-group list-group-flush">
						<!-- 개인 구성원 반복 -->
						<li th:each="m : ${members}"
							class="list-group-item d-flex justify-content-between align-items-center"
							th:classappend="${isAdmin} ? 'clickable-row' : 'readonly-row'"
							th:onclick="${isAdmin} ? |window.location='@{/users/{userCode}(userCode=${m.userCode})}'| : ''">

							<div
								class="d-flex justify-content-between align-items-center w-100">
								<div>
									👤 <span class="member-name" th:text="${m.userName}"></span> <small
										class="text-muted ms-2" th:text="${m.roleName}"></small>
								</div>
								<div>
									<span class="member-email" th:text="${m.email}"></span>
								</div>
							</div>
						</li>

						<!-- 그룹 반복 -->
						<li th:each="g : ${groups}"
							class="list-group-item d-flex justify-content-between align-items-center"
							th:classappend="${isAdmin} ? 'clickable-row' : 'readonly-row'"
							th:onclick="${isAdmin} ? |window.location='@{/groups/{grCode}(grCode=${g.grCode})}'| : ''">

							<div>
								👥 <span class="member-name" th:text="${g.grName}">그룹명</span> <small
									class="text-muted ms-2" th:text="${g.roleName}">팀장</small>
							</div>
							<div>
								<span class="member-email" th:text="${g.grCode}">GR001</span>
							</div>
						</li>

						<!-- 구성원/그룹이 없을 때 -->
						<li th:if="${#lists.isEmpty(members) and #lists.isEmpty(groups)}"
							class="text-center text-muted py-3">구성원이나 그룹이 없습니다.</li>

					</ul>
				</div>

			</div>

		</div>
	</div>

	<script th:src="@{/js/overview/overview.js}"></script>
</body>
</html>
